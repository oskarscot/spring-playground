spring:
  application:
    name: Springdeed

  docker:
    compose:
      file: ./services/compose.yaml

  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/springdeed
  modulith:
    runtime:
      flyway-enabled: false
    events:
      jdbc:
        schema-initialization:
          enabled: true
